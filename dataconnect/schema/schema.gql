# Workshop Wizard Schema (Updated to match Team Backend)

# User table is keyed by Firebase Auth UID.
type User @table {
  # `@default(expr: "auth.uid")` sets it to Firebase Auth UID during insert and upsert.
  id: String! @default(expr: "auth.uid")
  displayName: String
  email: String
  role: String
  photoUrl: String
  bio: String
  contactNumber: String
  createdAt: Date! @default(expr: "request.time")
}

# Club table
type Club @table {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  description: String
}

# Event table
type Event @table {
  id: UUID! @default(expr: "uuidV4()")
  title: String!
  date: Date!
}

# Registration table
type Registration @table {
  user: User!
  event: Event!
}

# Announcement table
type Announcement @table {
  id: UUID! @default(expr: "uuidV4()")
  content: String!
}
